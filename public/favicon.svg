<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="AMR KC Academy">
  <!-- Mortarboard on brand navy with the AMR-red tassel. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16497b"/>
      <stop offset="1" stop-color="#0b2e4f"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- cap base (fez) -->
  <path d="M176 278 L176 352 Q256 394 336 352 L336 278 Q256 320 176 278 Z" fill="#dbe4ee"/>
  <!-- board -->
  <path d="M256 142 L452 230 L256 318 L60 230 Z" fill="#ffffff"/>
  <!-- tassel -->
  <path d="M452 230 L452 330" stroke="#e11d2e" stroke-width="15" stroke-linecap="round"/>
  <circle cx="452" cy="345" r="17" fill="#e11d2e"/>
</svg>
